  <circle cx="395" cy="68" r="4" fill="#10B981"><animate attributeName="opacity" values=".35;1;.35" dur="2s" repeatCount="indefinite"/></circle>

  <g>
    
        <text x="224" y="178" text-anchor="middle" class="ascii" opacity="0">

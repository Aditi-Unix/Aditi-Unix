  <circle cx="508" cy="65" r="5" fill="#fb7185"/><circle cx="526" cy="65" r="5" fill="#fbbf24"/><circle cx="544" cy="65" r="5" fill="#34d399"/>
  <text x="812" y="69" text-anchor="middle" class="mono" font-size="11" fill="#94A3B8">developer.profile — backend</text>

  <g class="sans">

              │       │ ▄▄ │        │
          <animate attributeName="opacity" values="0;1" dur=".28s" begin="0.39s" fill="freeze"/>
        </text>
        <text x="224" y="290" text-anchor="middle" class="ascii" opacity="0">
              │       ╰────╯        │
          <animate attributeName="opacity" values="0;1" dur=".28s" begin="0.52s" fill="freeze"/>
        </text>
        <text x="224" y="318" text-anchor="middle" class="ascii" opacity="0">
               ╲    ╭────────╮     ╱
          <animate attributeName="opacity" values="0;1" dur=".28s" begin="0.65s" fill="freeze"/>
        </text>
        <text x="224" y="346" text-anchor="middle" class="ascii" opacity="0">
                ╰───╯        ╰────╯
          <animate attributeName="opacity" values="0;1" dur=".28s" begin="0.78s" fill="freeze"/>
        </text>
        <text x="224" y="374" text-anchor="middle" class="ascii" opacity="0">
                    ╲       ╱
          <animate attributeName="opacity" values="0;1" dur=".28s" begin="0.91s" fill="freeze"/>
        </text>
        <text x="224" y="402" text-anchor="middle" class="ascii" opacity="0">
                     ╲____╱
          <animate attributeName="opacity" values="0;1" dur=".28s" begin="1.04s" fill="freeze"/>
        </text>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -7;0 0" dur="5s" repeatCount="indefinite"/>

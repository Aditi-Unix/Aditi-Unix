<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1180 610" role="img" aria-label="Aditi Rathi GitHub profile banner">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#030712"/>
    <stop offset=".5" stop-color="#0F172A"/>
    <stop offset="1" stop-color="#030712"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="8s" repeatCount="indefinite"/></stop>
    <stop offset=".5" stop-color="#22D3EE"><animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="8s" repeatCount="indefinite"/></stop>
    <stop offset="1" stop-color="#10B981"><animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="8s" repeatCount="indefinite"/></stop>
  </linearGradient>
  <radialGradient id="glow1"><stop stop-color="#7C3AED" stop-opacity=".25"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/></radialGradient>
  <radialGradient id="glow2"><stop stop-color="#22D3EE" stop-opacity=".20"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
  <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#FFFFFF" stop-opacity=".075"/><stop offset="1" stop-color="#FFFFFF" stop-opacity=".018"/></linearGradient>
  <linearGradient id="pill"><stop stop-color="#7C3AED" stop-opacity=".10"/><stop offset="1" stop-color="#22D3EE" stop-opacity=".07"/></linearGradient>
  <linearGradient id="shine" x1="0" x2="1"><stop stop-color="white" stop-opacity="0"/><stop offset=".5" stop-color="white" stop-opacity=".14"/><stop offset="1" stop-color="white" stop-opacity="0"/></linearGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="14"/></filter>
  <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4"/></filter>
  <clipPath id="outer"><rect x="5" y="5" width="1170" height="600" rx="28"/></clipPath>
  <style>
    .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#F8FAFC; }
    .muted { fill:#94A3B8; }
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .ascii { font-family: "SFMono-Regular", Consolas, monospace; font-size:19px; font-weight:700; fill:url(#accent); }
    .pillText { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size:12px; font-weight:600; fill:#F8FAFC; }
  </style>
</defs>

<g clip-path="url(#outer)">
  <rect width="1180" height="610" fill="url(#bgGrad)"/>
  <circle cx="150" cy="95" r="230" fill="url(#glow1)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0 0;55 30;0 0" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="510" r="250" fill="url(#glow2)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0 0;-65 -35;0 0" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- particles -->
